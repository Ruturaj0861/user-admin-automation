name: UI Automation

on:
  schedule:
    - cron: '30 10 * * *'   # 4 PM IST
  workflow_dispatch:

jobs:
  run-ui-tests:

    runs-on: ubuntu-latest

    steps:

      # Checkout automation repo
      - name: Checkout Automation Repo
        uses: actions/checkout@v4


      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven


      - name: Verify Maven
        run: mvn -version


      # Setup Node (REQUIRED for Vite)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x


      # Clone API repo
      - name: Clone API Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-api.git


      # Install API dependencies
      - name: Install API Dependencies
        run: |
          cd user-api
          npm install


      # Start API server
      - name: Start API Server
        run: |
          cd user-api
          nohup node server.js &
          sleep 10


      # Wait for API
      - name: Wait for API to Start
        run: |
          echo "Checking API..."
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/users/count > /dev/null; then
              echo "API running"
              exit 0
            fi
            echo "Waiting API..."
            sleep 5
          done
          echo "API failed"
          exit 1


      # Clone UI repo
      - name: Clone UI Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-ui.git


      # Install UI dependencies
      - name: Install UI Dependencies
        run: |
          cd user-ui
          npm install


      # Start UI server
      - name: Start UI Server
        run: |
          cd user-ui
          nohup npm run dev > ui.log 2>&1 &
          sleep 20


      # Wait for UI
      - name: Wait for UI to Start
        run: |
          echo "Checking UI..."
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null; then
              echo "UI running"
              exit 0
            fi
            echo "Waiting UI..."
            sleep 5
          done
          echo "UI failed"
          exit 1


      # Create .env for automation tests
      - name: Create .env file
        run: |
          echo "BASE_URL=http://localhost:5173" >> .env
          echo "BROWSER=chrome" >> .env
          echo "TEST_PASSWORD=Password@123" >> .env


      # Run Selenium tests
      - name: Run UI Automation Tests
        run: mvn clean test


      # Generate Allure report
      - name: Generate Allure Report
        run: |
          if [ -d "target/allure-results" ]; then
            mvn allure:report
          else
            echo "Allure results not found"
          fi


      # Deploy report to GitHub Pages
      - name: Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          publish_branch: gh-pages


      # Send email report
      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🚀 UI Automation Test Execution - SUCCESS
          to: ruturaj.ppr24@gmail.com
          from: "QA Automation CI Bot <noreply@automation-ci.local>"
          html_body: |
            <div style="font-family:Arial;padding:20px;background:#f6f8fa">
            <h2 style="color:#2ea44f;">✅ UI Automation Testing Completed</h2>

            <p><b>Repository:</b> user-admin-automation</p>
            <p><b>Execution:</b> Scheduled Daily Run (4 PM IST)</p>

            <br>

            <a href="https://ruturaj0861.github.io/user-admin-automation/"
            style="background:#0366d6;color:white;padding:12px 20px;text-decoration:none;border-radius:6px;">
            📊 Open Live Test Report
            </a>

            <br><br>

            <p style="color:gray;font-size:12px">
            This is an automated system email. Please do not reply.
            </p>

            </div>