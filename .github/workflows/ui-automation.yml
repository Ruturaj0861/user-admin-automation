name: UI Automation

on:
  schedule:
    - cron: '30 0 * * *'   # 6 AM IST
  workflow_dispatch:

jobs:
  run-ui-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Automation Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Clone API Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-api.git

      - name: Install API Dependencies
        run: |
          cd user-api
          npm install

      - name: Start API Server
        run: |
          cd user-api
          nohup node server.js > api.log 2>&1 &
          sleep 10

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/users/count > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Clone UI Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-ui.git

      - name: Install UI Dependencies
        run: |
          cd user-ui
          npm install

      - name: Start UI Server
        run: |
          cd user-ui
          nohup npm run dev > ui.log 2>&1 &
          sleep 20

      - name: Wait for UI
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Create .env file
        run: |
          echo "BASE_URL=http://localhost:5173" >> .env
          echo "BROWSER=chrome" >> .env
          echo "HEADLESS=true" >> .env
          echo "TEST_PASSWORD=Password@123" >> .env

      # ✅ Run tests but DO NOT STOP pipeline if failed
      - name: Run UI Automation Tests
        run: mvn clean test
        continue-on-error: true

      # Install XML parser
      - name: Install XML Tool
        if: always()
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      # Extract summary
      - name: Extract Test Summary
        if: always()
        run: |
          FILE=target/surefire-reports/testng-results.xml

          TOTAL=$(xmllint --xpath "string(//testng-results/@total)" $FILE 2>/dev/null || echo "0")
          PASSED=$(xmllint --xpath "string(//testng-results/@passed)" $FILE 2>/dev/null || echo "0")
          FAILED=$(xmllint --xpath "string(//testng-results/@failed)" $FILE 2>/dev/null || echo "0")
          SKIPPED=$(xmllint --xpath "string(//testng-results/@skipped)" $FILE 2>/dev/null || echo "0")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # Dynamic message
      - name: Generate Dynamic Message
        if: always()
        run: |
          if [ "$FAILED" -eq "0" ]; then
            echo "MESSAGE=🎉 All tests passed! Your app is rock solid today!" >> $GITHUB_ENV
          elif [ "$FAILED" -lt "3" ]; then
            echo "MESSAGE=⚠️ Few tests failed. Minor issues detected!" >> $GITHUB_ENV
          else
            echo "MESSAGE=🔥 Multiple failures! Time to debug like a pro!" >> $GITHUB_ENV
          fi

      # Install Allure
      - name: Install Allure
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # Generate report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "target/allure-results" ]; then
            allure generate target/allure-results --clean -o allure-report
          fi

      # Deploy report
      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # Send email
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: ${{ env.FAILED == '0' && '✅ All Tests Passed' || '❌ Test Failures Detected' }}
          to: ruturaj.ppr24@gmail.com
          from: "QA Automation CI Bot <noreply@automation-ci.local>"
          html_body: |
            <div style="font-family:Arial;background:#0f172a;padding:20px;color:white;">
              <div style="max-width:600px;margin:auto;background:#111827;padding:20px;border-radius:12px;">

                <h2 style="text-align:center;color:#38bdf8;">🚀 UI Automation Report</h2>

                <div style="background:#1e293b;padding:10px;border-radius:8px;text-align:center;margin-bottom:15px;">
                  <b>${{ env.MESSAGE }}</b>
                </div>

                <div style="background:#1f2937;padding:10px;margin-bottom:10px;border-radius:8px;">
                  Total: <b>${{ env.TOTAL }}</b>
                </div>
                <div style="background:#064e3b;padding:10px;margin-bottom:10px;border-radius:8px;">
                  Passed: <b style="color:#22c55e">${{ env.PASSED }}</b>
                </div>
                <div style="background:#7f1d1d;padding:10px;margin-bottom:10px;border-radius:8px;">
                  Failed: <b style="color:#ef4444">${{ env.FAILED }}</b>
                </div>
                <div style="background:#78350f;padding:10px;border-radius:8px;">
                  Skipped: <b style="color:#facc15">${{ env.SKIPPED }}</b>
                </div>

                <table style="width:100%;margin-top:15px;border-collapse:collapse;">
                  <tr><th>Metric</th><th>Count</th></tr>
                  <tr><td>Total</td><td>${{ env.TOTAL }}</td></tr>
                  <tr><td>Passed</td><td>${{ env.PASSED }}</td></tr>
                  <tr><td>Failed</td><td>${{ env.FAILED }}</td></tr>
                  <tr><td>Skipped</td><td>${{ env.SKIPPED }}</td></tr>
                </table>

                <div style="text-align:center;margin-top:15px;">
                  <a href="https://ruturaj0861.github.io/user-admin-automation/"
                     style="background:#3b82f6;padding:10px 15px;border-radius:6px;color:white;text-decoration:none;">
                     📊 View Report
                  </a>
                </div>

              </div>
            </div>