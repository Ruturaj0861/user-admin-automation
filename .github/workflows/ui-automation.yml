name: UI Automation

on:
  schedule:
    - cron: '30 22 * * *'   # 4 AM IST
  workflow_dispatch:

jobs:
  run-ui-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Automation Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Clone API Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-api.git

      - name: Install API Dependencies
        run: |
          cd user-api
          npm install

      - name: Start API Server
        run: |
          cd user-api
          nohup node server.js > api.log 2>&1 &
          sleep 10

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/users/count > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Clone UI Repository
        run: |
          git clone https://github.com/Ruturaj0861/user-ui.git

      - name: Install UI Dependencies
        run: |
          cd user-ui
          npm install

      - name: Start UI Server
        run: |
          cd user-ui
          nohup npm run dev > ui.log 2>&1 &
          sleep 20

      - name: Wait for UI
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Create .env file
        run: |
          echo "BASE_URL=http://localhost:5173" >> .env
          echo "BROWSER=chrome" >> .env
          echo "HEADLESS=true" >> .env
          echo "TEST_PASSWORD=Password@123" >> .env

      - name: Run UI Automation Tests
        run: mvn clean test

      # ✅ Extract Test Summary
      - name: Extract Test Summary
        run: |
          TOTAL=$(grep -o 'tests="[^"]*"' target/surefire-reports/testng-results.xml | head -1 | cut -d'"' -f2)
          PASSED=$(grep -o 'passed="[^"]*"' target/surefire-reports/testng-results.xml | head -1 | cut -d'"' -f2)
          FAILED=$(grep -o 'failed="[^"]*"' target/surefire-reports/testng-results.xml | head -1 | cut -d'"' -f2)
          SKIPPED=$(grep -o 'skipped="[^"]*"' target/surefire-reports/testng-results.xml | head -1 | cut -d'"' -f2)

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV

      # ✅ Install Allure
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: |
          if [ -d "target/allure-results" ]; then
            allure generate target/allure-results --clean -o allure-report
          fi

      - name: Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages

      # ✅ Modern Email (3D UI + Table)
      - name: Send Email Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 UI Automation Report"
          to: ruturaj.ppr24@gmail.com
          from: "QA Automation CI Bot <noreply@automation-ci.local>"
          html_body: |
            <div style="font-family:Segoe UI;padding:30px;background:#0f172a;color:white">
              <div style="max-width:650px;margin:auto;background:#111827;padding:25px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.6);">

                <h2 style="text-align:center;color:#38bdf8;">🚀 UI Automation Report</h2>

                <div style="display:flex;gap:10px;margin:20px 0;">
                  <div style="flex:1;background:#1f2937;padding:15px;border-radius:10px;text-align:center;">
                    <p>Total</p><h2>${{ env.TOTAL }}</h2>
                  </div>
                  <div style="flex:1;background:#064e3b;padding:15px;border-radius:10px;text-align:center;">
                    <p>Passed</p><h2 style="color:#22c55e">${{ env.PASSED }}</h2>
                  </div>
                  <div style="flex:1;background:#7f1d1d;padding:15px;border-radius:10px;text-align:center;">
                    <p>Failed</p><h2 style="color:#ef4444">${{ env.FAILED }}</h2>
                  </div>
                  <div style="flex:1;background:#78350f;padding:15px;border-radius:10px;text-align:center;">
                    <p>Skipped</p><h2 style="color:#facc15">${{ env.SKIPPED }}</h2>
                  </div>
                </div>

                <table style="width:100%;border-collapse:collapse;">
                  <tr style="background:#1e293b;color:#38bdf8;">
                    <th style="padding:10px;border:1px solid #334155;">Metric</th>
                    <th style="padding:10px;border:1px solid #334155;">Count</th>
                  </tr>
                  <tr><td style="padding:10px;border:1px solid #334155;">Total</td><td>${{ env.TOTAL }}</td></tr>
                  <tr><td style="padding:10px;border:1px solid #334155;color:#22c55e;">Passed</td><td>${{ env.PASSED }}</td></tr>
                  <tr><td style="padding:10px;border:1px solid #334155;color:#ef4444;">Failed</td><td>${{ env.FAILED }}</td></tr>
                  <tr><td style="padding:10px;border:1px solid #334155;color:#facc15;">Skipped</td><td>${{ env.SKIPPED }}</td></tr>
                </table>

                <div style="text-align:center;margin-top:20px;">
                  <a href="https://ruturaj0861.github.io/user-admin-automation/"
                     style="background:#3b82f6;padding:12px 20px;border-radius:8px;color:white;text-decoration:none;">
                     📊 View Report
                  </a>
                </div>

              </div>
            </div>